<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B.E.S.T Barangay Electronic System</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        /* ... (keep all your existing styles) ... */
    </style>
</head>
<body>

<!-- ... (keep all your existing HTML) ... -->

<!-- ===== FULLY FUNCTIONAL JAVASCRIPT ===== -->
<script>
    (function() {
        // ----- INITIALIZE DEFAULT BARANGAYS IF NONE EXIST -----
        function initializeDefaultBarangays() {
            try {
                const stored = localStorage.getItem('barangayData');
                if (!stored || stored === '[]') {
                    const defaultBarangays = [
                        { name: "North Poblacion", code: "BRGY-001" },
                        { name: "South Poblacion", code: "BRGY-002" },
                        { name: "East District", code: "BRGY-003" },
                        { name: "West District", code: "BRGY-004" },
                        { name: "Central Poblacion", code: "BRGY-005" }
                    ];
                    localStorage.setItem('barangayData', JSON.stringify(defaultBarangays));
                    
                    // Initialize citizen data for each barangay
                    defaultBarangays.forEach(b => {
                        if (!localStorage.getItem('citizenData_' + b.name)) {
                            localStorage.setItem('citizenData_' + b.name, JSON.stringify([]));
                        }
                    });
                    
                    return defaultBarangays;
                }
                return JSON.parse(stored);
            } catch (e) {
                console.error('Error initializing barangays:', e);
                const defaultBarangays = [
                    { name: "North Poblacion", code: "BRGY-001" },
                    { name: "South Poblacion", code: "BRGY-002" }
                ];
                localStorage.setItem('barangayData', JSON.stringify(defaultBarangays));
                return defaultBarangays;
            }
        }

        // ----- LOAD BARANGAY DATA -----
        let barangays = initializeDefaultBarangays();
        let citizenNumber = 1;

        // ----- SAVE BARANGAY DATA -----
        function saveBarangays() {
            try {
                localStorage.setItem('barangayData', JSON.stringify(barangays));
                console.log('Barangay data saved:', barangays);
            } catch (e) {
                console.error('Error saving barangays:', e);
            }
        }

        // ----- RENDER BARANGAY LIST -----
        function renderBarangays() {
            const container = document.getElementById('barangayList');
            if (!container) return;

            if (barangays.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #94a3b8;">
                        <i class="fa-solid fa-building" style="font-size: 2rem; display: block; margin-bottom: 0.5rem;"></i>
                        No barangays created yet. Click "Create New Barangay" to add one.
                    </div>
                `;
                return;
            }

            container.innerHTML = barangays.map((barangay, index) => `
                <div class="barangay-item">
                    <div class="info">
                        <span class="name">${barangay.name}</span>
                        <span class="code">${barangay.code}</span>
                    </div>
                    <div class="actions">
                        <button onclick="window.deleteBarangay(${index})" title="Delete Barangay">
                            <i class="fa-solid fa-trash" style="color: #dc2626;"></i>
                        </button>
                        <button onclick="window.viewBarangayData('${barangay.name}')" title="View Citizens">
                            <i class="fa-solid fa-users" style="color: #0b2b4a;"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ----- DELETE BARANGAY -----
        window.deleteBarangay = function(index) {
            if (index < 0 || index >= barangays.length) return;
            const name = barangays[index].name;
            if (confirm(`Are you sure you want to delete "${name}" barangay? This will also remove all citizen data.`)) {
                barangays.splice(index, 1);
                localStorage.removeItem('citizenData_' + name);
                saveBarangays();
                renderBarangays();
                updateBarangayFilter();
                updateCitizenBarangaySelect();
                updateTableByFilter();
                alert(`✅ Barangay "${name}" deleted successfully.`);
            }
        };

        // ----- VIEW BARANGAY DATA -----
        window.viewBarangayData = function(name) {
            const citizens = JSON.parse(localStorage.getItem('citizenData_' + name) || '[]');
            if (citizens.length === 0) {
                alert(`📋 No citizens registered in "${name}" yet.`);
            } else {
                let msg = `📋 Citizens in "${name}":\n\n`;
                citizens.forEach((c, i) => {
                    msg += `${i+1}. ${c.fullName} (${c.age}) - ${c.address}\n`;
                });
                alert(msg);
            }
        };

        // ----- UPDATE BARANGAY FILTER DROPDOWN -----
        function updateBarangayFilter() {
            const filter = document.getElementById('barangayFilter');
            if (!filter) return;
            
            const currentValue = filter.value;
            filter.innerHTML = '<option value="all">All Barangay</option>';
            barangays.forEach(b => {
                const option = document.createElement('option');
                option.value = b.name;
                option.textContent = b.name + ' (' + b.code + ')';
                filter.appendChild(option);
            });
            if (currentValue && barangays.some(b => b.name === currentValue)) {
                filter.value = currentValue;
            }
        }

        // ----- UPDATE CITIZEN BARANGAY SELECT (in Add Citizen form) -----
        function updateCitizenBarangaySelect() {
            const select = document.getElementById('citizenBarangay');
            if (!select) return;
            
            const currentValue = select.value;
            select.innerHTML = '<option value="">Select Barangay</option>';
            barangays.forEach(b => {
                const option = document.createElement('option');
                option.value = b.name;
                option.textContent = b.name + ' (' + b.code + ')';
                select.appendChild(option);
            });
            if (currentValue && barangays.some(b => b.name === currentValue)) {
                select.value = currentValue;
            }
        }

        // ----- UPDATE TABLE BASED ON FILTER -----
        function updateTableByFilter() {
            const filter = document.getElementById('barangayFilter');
            if (!filter) return;
            
            const selected = filter.value;
            if (selected === 'all') {
                let allCitizens = [];
                barangays.forEach(b => {
                    const citizens = JSON.parse(localStorage.getItem('citizenData_' + b.name) || '[]');
                    allCitizens = allCitizens.concat(citizens);
                });
                updateTable(allCitizens);
            } else {
                const citizens = JSON.parse(localStorage.getItem('citizenData_' + selected) || '[]');
                updateTable(citizens);
            }
        }

        // ----- UPDATE TABLE -----
        function updateTable(citizens) {
            const tbody = document.getElementById('citizenTable');
            if (!tbody) return;

            if (!citizens || citizens.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="coming">
                            — No citizens registered yet —
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = citizens.map(c => `
                <tr>
                    <td>${c.id || 'N/A'}</td>
                    <td>${c.fullName || 'N/A'}</td>
                    <td>${c.age || 'N/A'}</td>
                    <td>${c.gender || 'N/A'}</td>
                    <td>${c.address || 'N/A'}</td>
                    <td>${c.contact || 'N/A'}</td>
                    <td>${c.status || 'Active'}</td>
                    <td>
                        <button title="View" onclick="alert('Viewing ${c.fullName}')">👁</button>
                        <button title="Edit" onclick="alert('Editing ${c.fullName}')">✏</button>
                        <button title="Delete" onclick="deleteCitizen('${c.id}')">🗑</button>
                    </td>
                </tr>
            `).join('');
        }

        // ----- DELETE CITIZEN -----
        window.deleteCitizen = function(id) {
            if (!id) return;
            
            // Find which barangay this citizen belongs to
            for (let b of barangays) {
                const citizens = JSON.parse(localStorage.getItem('citizenData_' + b.name) || '[]');
                const index = citizens.findIndex(c => c.id === id);
                if (index !== -1) {
                    if (confirm(`Are you sure you want to delete this citizen?`)) {
                        citizens.splice(index, 1);
                        localStorage.setItem('citizenData_' + b.name, JSON.stringify(citizens));
                        updateTableByFilter();
                        alert('✅ Citizen deleted successfully.');
                    }
                    return;
                }
            }
        };

        // ----- CREATE BARANGAY MODAL -----
        const barangayModal = document.getElementById('barangayModal');
        const createBarangayBtn = document.getElementById('createBarangayBtn');
        const closeBarangayModal = document.getElementById('closeBarangayModal');
        const cancelBarangayBtn = document.getElementById('cancelBarangayBtn');
        const barangayForm = document.getElementById('barangayForm');

        function openBarangayModal() {
            barangayModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeBarangayModalFunc() {
            barangayModal.style.display = 'none';
            document.body.style.overflow = 'auto';
            barangayForm.reset();
        }

        if (createBarangayBtn) {
            createBarangayBtn.addEventListener('click', openBarangayModal);
        }
        if (closeBarangayModal) {
            closeBarangayModal.addEventListener('click', closeBarangayModalFunc);
        }
        if (cancelBarangayBtn) {
            cancelBarangayBtn.addEventListener('click', closeBarangayModalFunc);
        }

        window.addEventListener('click', function(e) {
            if (e.target === barangayModal) {
                closeBarangayModalFunc();
            }
        });

        // ----- SUBMIT BARANGAY FORM -----
        if (barangayForm) {
            barangayForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const name = document.getElementById('barangayName').value.trim();
                const code = document.getElementById('barangayCode').value.trim();

                if (!name) { alert('Please enter barangay name.'); return; }
                if (!code) { alert('Please enter barangay code.'); return; }

                if (barangays.some(b => b.name.toLowerCase() === name.toLowerCase())) {
                    alert('⚠️ A barangay with this name already exists.');
                    return;
                }

                if (barangays.some(b => b.code.toLowerCase() === code.toLowerCase())) {
                    alert('⚠️ A barangay with this code already exists.');
                    return;
                }

                barangays.push({ name, code });
                saveBarangays();
                localStorage.setItem('citizenData_' + name, JSON.stringify([]));
                renderBarangays();
                updateBarangayFilter();
                updateCitizenBarangaySelect();
                closeBarangayModalFunc();
                
                alert(`✅ Barangay "${name}" created successfully!`);
            });
        }

        // ----- CITIZEN MODAL -----
        const modal = document.getElementById('citizenModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const form = document.getElementById('citizenForm');

        if (openBtn) {
            openBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (barangays.length === 0) {
                    alert('⚠️ Please create a barangay first before adding citizens.');
                    return;
                }
                modal.style.display = 'block';
                document.body.style.overflow = 'hidden';
                updateCitizenBarangaySelect();
            });
        }

        function closeModalFunc() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            if (form) form.reset();
        }

        if (closeBtn) closeBtn.addEventListener('click', closeModalFunc);
        if (cancelBtn) cancelBtn.addEventListener('click', closeModalFunc);

        window.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModalFunc();
            }
        });

        // ----- SUBMIT CITIZEN FORM -----
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const fullname = document.getElementById('fullName').value.trim();
                const age = document.getElementById('age').value.trim();
                const gender = document.getElementById('gender').value;
                const address = document.getElementById('address').value.trim();
                const contact = document.getElementById('contact').value.trim();
                const status = document.getElementById('status').value;
                const selectedBarangay = document.getElementById('citizenBarangay').value;

                if (!fullname) { alert('Please enter full name.'); return; }
                if (!age || isNaN(age) || Number(age) < 0) { alert('Please enter a valid age.'); return; }
                if (!gender) { alert('Please select gender.'); return; }
                if (!address) { alert('Please enter address.'); return; }
                if (!contact) { alert('Please enter contact number.'); return; }
                if (!selectedBarangay) { alert('Please select a barangay.'); return; }

                let citizens = JSON.parse(localStorage.getItem('citizenData_' + selectedBarangay) || '[]');
                
                const id = "BEST-" + Date.now().toString().slice(-6);
                const citizen = {
                    id: id,
                    fullName: fullname,
                    age: age,
                    gender: gender,
                    address: address,
                    contact: contact,
                    status: status,
                    barangay: selectedBarangay
                };

                citizens.push(citizen);
                localStorage.setItem('citizenData_' + selectedBarangay, JSON.stringify(citizens));

                closeModalFunc();
                updateTableByFilter();
                alert(`✅ Citizen "${fullname}" added to "${selectedBarangay}" successfully!`);
            });
        }

        // ----- FILTER BARANGAY -----
        const barangayFilter = document.getElementById('barangayFilter');
        if (barangayFilter) {
            barangayFilter.addEventListener('change', updateTableByFilter);
        }

        // ----- SEARCH -----
        const searchInput = document.querySelector('.table-tools input');
        if (searchInput) {
            searchInput.addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    const val = this.value.trim().toLowerCase();
                    const filter = document.getElementById('barangayFilter');
                    const selected = filter ? filter.value : 'all';
                    
                    let citizens = [];
                    if (selected === 'all') {
                        barangays.forEach(b => {
                            const c = JSON.parse(localStorage.getItem('citizenData_' + b.name) || '[]');
                            citizens = citizens.concat(c);
                        });
                    } else {
                        citizens = JSON.parse(localStorage.getItem('citizenData_' + selected) || '[]');
                    }
                    
                    if (val) {
                        const filtered = citizens.filter(c => 
                            c.fullName.toLowerCase().includes(val) ||
                            c.address.toLowerCase().includes(val) ||
                            (c.id && c.id.toLowerCase().includes(val))
                        );
                        updateTable(filtered);
                        if (filtered.length === 0) {
                            alert('🔍 No results found for: ' + val);
                        }
                    } else {
                        updateTableByFilter();
                    }
                }
            });
        }

        // ----- NOTIFICATION -----
        document.querySelector('.notification')?.addEventListener('click', function(e) {
            e.stopPropagation();
            alert('🔔 You have 3 notifications.');
        });

        // ----- PROFILE -----
        document.querySelector('.profile')?.addEventListener('click', function() {
            alert('👤 Admin profile');
        });

        // ----- TOP MENU & SIDEBAR -----
        document.querySelectorAll('.top-menu a, .side-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                if (this.classList.contains('active')) {
                    alert('🏠 You are on the Dashboard.');
                } else {
                    alert('📄 This section is coming soon.');
                }
            });
        });

        // ----- PREVIEW CARD BUTTONS -----
        document.querySelectorAll('.preview-card button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                alert('📌 This page is under development.');
            });
        });

        // ----- INITIALIZE -----
        console.log('✅ B.E.S.T Barangay Electronic System is fully functional.');
        console.log('📊 Loaded barangays:', barangays);
        
        renderBarangays();
        updateBarangayFilter();
        updateCitizenBarangaySelect();
        updateTableByFilter();

    })();
</script>

</body>
</html>
